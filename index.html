<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
<meta name="description" content="霓虹游戏厅 - 街机 × 像素 × 霓虹 单文件 HTML 小游戏合集">
<title>霓虹游戏厅 · Neon Arcade</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; }
  body {
    background: radial-gradient(ellipse at top, #1a0938 0%, #05010f 55%, #05010f 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      linear-gradient(rgba(120, 90, 220, 0.05) 1px, transparent 1px) 0 0 / 40px 40px,
      linear-gradient(90deg, rgba(120, 90, 220, 0.05) 1px, transparent 1px) 0 0 / 40px 40px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 80%);
  }
  body::after {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(0, 240, 255, 0.12) 0%, transparent 35%),
      radial-gradient(circle at 80% 70%, rgba(255, 90, 247, 0.10) 0%, transparent 40%);
  }
  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 56px 24px 80px; }
  header { text-align: center; margin-bottom: 48px; }
  .brand { font-size: 12px; letter-spacing: 8px; color: #8a7bff; text-transform: uppercase; margin-bottom: 14px; }
  h1 {
    font-size: clamp(40px, 8vw, 76px);
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, #00f0ff 0%, #ff5af7 100%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
    line-height: 1.1;
    margin-bottom: 14px;
    filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.3));
  }
  .tagline { font-size: clamp(13px, 1.8vw, 16px); color: #8b8aa8; letter-spacing: 2px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    --accent: #00f0ff;
    display: block;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 18px;
    overflow: hidden;
    text-decoration: none;
    color: #fff;
    transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.4, 1), border-color 0.25s, box-shadow 0.25s, background 0.25s;
    cursor: pointer;
    position: relative;
  }
  .card:hover, .card:focus-visible {
    transform: translateY(-4px);
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.05);
    box-shadow: 0 16px 50px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--accent), 0 0 40px -8px var(--accent);
    outline: none;
  }
  .cover {
    position: relative;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, var(--a, #00f0ff) 0%, var(--b, #ff5af7) 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .cover::before {
    content: ""; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 4px),
      radial-gradient(ellipse at center, transparent 30%, rgba(0, 0, 0, 0.45) 100%);
    pointer-events: none;
  }
  .art {
    position: relative; z-index: 1;
    width: 78%; height: 78%;
    color: rgba(255, 255, 255, 0.96);
    filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.5));
  }
  .art svg { width: 100%; height: 100%; display: block; }
  .badge {
    position: absolute; top: 14px; right: 14px;
    padding: 4px 10px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 999px;
    font-size: 10px; letter-spacing: 2px; font-weight: 700;
    color: #fff;
    z-index: 2;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .badge.new { color: #5ff0ff; border-color: rgba(0, 240, 255, 0.6); }
  .body { padding: 22px; }
  .titles { margin-bottom: 10px; }
  .titles h2 { font-size: 22px; font-weight: 700; margin-bottom: 2px; color: #fff; }
  .titles .en { font-size: 11px; letter-spacing: 2px; color: #8b8aa8; text-transform: uppercase; }
  .body p { font-size: 14px; color: #b6b4d4; margin-bottom: 14px; line-height: 1.6; min-height: 44px; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  .tags span {
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 8px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px;
    color: #b6b4d4;
  }
  .cta {
    font-size: 13px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 6px;
    transition: gap 0.2s;
  }
  .card:hover .cta { gap: 10px; }
  footer {
    margin-top: 64px;
    text-align: center;
    color: #555274;
    font-size: 12px;
  }
  footer details {
    display: inline-block;
    text-align: left;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 18px;
    max-width: 580px;
  }
  footer summary {
    cursor: pointer;
    color: #8b8aa8;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    list-style: none;
    user-select: none;
  }
  footer summary::-webkit-details-marker { display: none; }
  footer summary::before { content: "▸ "; color: #5ff0ff; }
  footer details[open] summary::before { content: "▾ "; }
  footer ol { margin: 12px 0 0 20px; line-height: 1.9; color: #b6b4d4; }
  footer code {
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 11px;
    padding: 1px 6px;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 4px;
    color: #5ff0ff;
  }
  .copy { letter-spacing: 1.5px; font-size: 11px; margin-top: 8px; }
  @media (max-width: 600px) {
    .container { padding: 36px 16px 60px; }
    header { margin-bottom: 32px; }
    .grid { gap: 14px; }
    .body { padding: 18px; }
    .titles h2 { font-size: 19px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">NEON ARCADE</div>
      <h1>霓虹游戏厅</h1>
      <p class="tagline">街机 × 像素 × 霓虹 · 单文件 HTML 小游戏合集</p>
    </header>

    <main class="grid" id="grid"></main>

    <footer>
      <details>
        <summary>如何添加新游戏？</summary>
        <ol>
          <li>在仓库根目录建一个 <code>你的游戏名/index.html</code>（可以引用同目录的 <code>.js</code> / <code>.css</code>）</li>
          <li>在本页 <code>&lt;script&gt;</code> 里的 <code>GAMES</code> 数组中加一项配置</li>
          <li>push 到 GitHub，GitHub Pages 自动上线</li>
        </ol>
      </details>
      <div class="copy">© 2026 NEON ARCADE · 单文件 · 零依赖</div>
    </footer>
  </div>

  <script>
    const GAMES = [
      {
        id: "neon-brick-breaker",
        title: "霓虹打砖块",
        titleEn: "Neon Brick Breaker",
        desc: "8 关 × 6 种道具 × 连击系统。鼠标 / 触屏 / 键盘都能玩，HD 渲染。",
        accent: "#00f0ff",
        gradient: ["#00f0ff", "#ff5af7"],
        tags: ["经典", "休闲", "8 关"],
        badge: { text: "PLAY", kind: "" },
        art: "bricks"
      },
      {
        id: "shootit",
        title: "暗夜战机",
        titleEn: "Neon Fighter",
        desc: "经典纵版卷轴射击 — 躲避弹幕，击落敌机，挑战最高分。",
        accent: "#ff8b3a",
        gradient: ["#ff8b3a", "#ff2d75"],
        tags: ["射击", "街机", "弹幕"],
        badge: { text: "PLAY", kind: "new" },
        art: "plane"
      }
    ];

    const SVG_ART = {
      bricks: `<svg viewBox="0 0 280 120" xmlns="http://www.w3.org/2000/svg">
        <g>
          <rect x="20"  y="14" width="50" height="16" rx="3" fill="rgba(255,255,255,0.95)"/>
          <rect x="74"  y="14" width="50" height="16" rx="3" fill="rgba(255,255,255,0.78)"/>
          <rect x="128" y="14" width="50" height="16" rx="3" fill="rgba(255,255,255,0.92)"/>
          <rect x="182" y="14" width="50" height="16" rx="3" fill="rgba(255,255,255,0.7)"/>
          <rect x="236" y="14" width="50" height="16" rx="3" fill="rgba(255,255,255,0.88)"/>
          <rect x="47"  y="34" width="50" height="16" rx="3" fill="rgba(255,255,255,0.65)"/>
          <rect x="101" y="34" width="50" height="16" rx="3" fill="rgba(255,255,255,0.85)"/>
          <rect x="155" y="34" width="50" height="16" rx="3" fill="rgba(255,255,255,0.72)"/>
          <rect x="209" y="34" width="50" height="16" rx="3" fill="rgba(255,255,255,0.85)"/>
          <rect x="74"  y="54" width="50" height="16" rx="3" fill="rgba(255,255,255,0.6)"/>
          <rect x="128" y="54" width="50" height="16" rx="3" fill="rgba(255,255,255,0.88)"/>
          <rect x="182" y="54" width="50" height="16" rx="3" fill="rgba(255,255,255,0.68)"/>
          <circle cx="140" cy="92" r="6" fill="#fff"/>
          <rect x="100" y="98" width="80" height="6" rx="3" fill="#fff" opacity="0.92"/>
        </g>
      </svg>`,
      plane: `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
        <g>
          <polygon points="100,22 110,72 148,86 148,96 110,92 110,108 148,116 100,106 52,116 90,108 90,92 52,96 52,86 90,72"
                   fill="rgba(255,255,255,0.95)" stroke="rgba(0,0,0,0.4)" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="100" cy="72" r="4.5" fill="rgba(0,0,0,0.5)"/>
          <line x1="30" y1="60" x2="170" y2="60" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-dasharray="3 5"/>
        </g>
      </svg>`
    };

    const grid = document.getElementById("grid");
    GAMES.forEach(g => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = g.id + "/";
      card.style.setProperty("--accent", g.accent);
      card.style.setProperty("--a", g.gradient[0]);
      card.style.setProperty("--b", g.gradient[1]);
      card.setAttribute("aria-label", g.title + " " + g.titleEn);
      card.innerHTML = `
        <div class="cover">
          <div class="art">${SVG_ART[g.art] || ""}</div>
          <div class="badge ${g.badge.kind}">${g.badge.text}</div>
        </div>
        <div class="body">
          <div class="titles">
            <h2>${g.title}</h2>
            <div class="en">${g.titleEn}</div>
          </div>
          <p>${g.desc}</p>
          <div class="tags">${g.tags.map(t => `<span>${t}</span>`).join("")}</div>
          <div class="cta">开始游戏 ▶</div>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
